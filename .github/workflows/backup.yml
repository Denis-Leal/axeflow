name: Backup PostgreSQL

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Run backup with PostgreSQL 18
        env:
          DATABASE_URL: ${{ secrets.DB_URL }}
        run: |
          mkdir backups
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')

          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v $PWD/backups:/backups \
            postgres:18 \
            sh -c 'pg_dump "$DATABASE_URL" > /backups/backup_'$TIMESTAMP'.sql'

      - name: Compress
        run: gzip backups/*.sql

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backups/*.gz
          
      - name: Notify success
        run: echo "Backup realizado com sucesso"
