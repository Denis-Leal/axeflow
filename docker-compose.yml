# version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: axeflow_db
    env_file:
      - ./backend/.env
    # environment:
      # POSTGRES_USER: terreiro
      # POSTGRES_PASSWORD: terreiro123
      # POSTGRES_DB: axeflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terreiro -d axeflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: axeflow_backend
    environment:
      DATABASE_URL: postgresql://terreiro:terreiro123@postgres:5432/axeflow
      SECRET_KEY: minha-chave-super-secreta-mude-em-producao
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: axeflow_frontend
    # NEXT_PUBLIC_API_URL não definido aqui intencionalmente.
    # O frontend detecta o host dinamicamente (funciona no PC e no celular via IP).
    # Para produção, defina: NEXT_PUBLIC_API_URL=https://api.seudominio.com
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
