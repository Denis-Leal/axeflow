<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão | AxeFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0720;
      color: #e8e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .symbol { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: #d4af37; margin-bottom: 0.75rem; }
    p { color: #a89cc8; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #d4af37;
      color: #1a0a2e;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div>
    <div class="symbol">☽✦☾</div>
    <h1>Sem conexão</h1>
    <p>Você está offline. Verifique sua internet e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
